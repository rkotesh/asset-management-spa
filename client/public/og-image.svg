<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0a" />
      <stop offset="50%" stop-color="#0f0f17" />
      <stop offset="100%" stop-color="#020205" />
    </linearGradient>
    <linearGradient id="primary" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="20%" r="50%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0" />
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <circle cx="200" cy="150" r="400" fill="url(#glow)" />
  
  <!-- Lock icon representation -->
  <g transform="translate(520, 120) scale(1.3)">
    <!-- Lock shackle -->
    <path d="M40 70 V 40 A 40 40 0 0 1 120 70" fill="none" stroke="url(#primary)" stroke-width="10" stroke-linecap="round" />
    <!-- Lock body -->
    <rect x="20" y="70" width="120" height="90" rx="18" fill="#0f0f17" stroke="url(#primary)" stroke-width="10" />
    <!-- Keyhole -->
    <circle cx="80" cy="108" r="10" fill="#06b6d4" />
    <path d="M76 116 L84 116 L87 135 L73 135 Z" fill="#06b6d4" />
  </g>
  
  <!-- Brand Name -->
  <text x="600" y="390" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="56" font-weight="900" fill="#ffffff" text-anchor="middle" letter-spacing="2">SECURE VAULT</text>
  <text x="600" y="445" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif" font-size="24" font-weight="500" fill="#9ca3af" text-anchor="middle" letter-spacing="1">Military-Grade Encrypted Repository</text>
  
  <!-- Divider -->
  <line x1="450" y1="495" x2="750" y2="495" stroke="url(#primary)" stroke-width="4" stroke-linecap="round" />
</svg>
